spring.application.name=mini-crm

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mini_crm}
spring.datasource.username=${DATABASE_USERNAME:crm_user}
spring.datasource.password=${DATABASE_PASSWORD:crm_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.error.include-message=never
server.error.include-binding-errors=never

app.jwt.secret=${JWT_SECRET:change-this-secret-in-production-change-this-secret-in-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}

app.bootstrap-admin.name=${BOOTSTRAP_ADMIN_NAME:Admin User}
app.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@crm.local}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:Admin12345}
